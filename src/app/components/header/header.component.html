<h1>Olympic games app</h1>
<hr />
<header>
  <div class="center">
    @if (backLink) {
      <a [routerLink]="backLink">Go back</a>
    }
    @if (title) {
      <h2>{{ title }}</h2>
    }
  </div>
  <div class="kpis">
    @for (kpi of kpis; track kpi.value) {
      <app-card [label]="kpi.label" [value]="kpi.value" />
    }
  </div>
</header>
