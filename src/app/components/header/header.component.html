<header>
  <h1>
    <a
      routerLink=""
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Olympic Games</a
    >
  </h1>
  <hr />
  <div class="center">
    @if (backLink) {
      <app-back-button [link]="backLink" />
    }
    @if (title) {
      <h2>{{ title }}</h2>
    }
  </div>
  <div class="kpis" aria-live="polite">
    @for (kpi of kpis; track kpi.value) {
      <app-card [label]="kpi.label" [value]="kpi.value" />
    }
  </div>
</header>
