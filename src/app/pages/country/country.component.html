<div class="page">
  <app-header
    [title]="titlePage$ | async"
    [kpis]="kpis$ | async"
    backLink="/"
  />
  @if (loading) {
    <app-loading />
  } @else if (error) {
    <app-error [message]="error" />
  } @else {
    @if (chart$ | async; as chart) {
      <app-chart [config]="chart" [label]="titlePage$ | async" />
    } @else {
      <app-empty />
    }
  }
</div>
