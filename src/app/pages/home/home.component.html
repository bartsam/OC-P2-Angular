<div class="page">
  <app-header [title]="titlePage" [kpis]="kpis$ | async" />

  @if (loading) {
    <app-loading />
  } @else if (error) {
    <app-error [message]="error" />
  } @else {
    @if (chart$ | async; as chart) {
      <app-chart [config]="chart" />
    } @else {
      <app-empty />
    }
  }
</div>
